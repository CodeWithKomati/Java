<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Learning Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

p{
    margin-bottom:40px;
    font-size:18px;
    opacity:0.85;
}

/* Button container */
.btn-container{
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
}

/* BIG Buttons */
a.button{
    text-decoration:none;
}

button{
    width:350px;
    padding:18px 25px;
    border:none;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:white;
    font-weight:bold;
}

/* Button colors */
.btn1{
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
}

.btn2{
    background: linear-gradient(45deg, #1fa2ff, #12d8fa, #a6ffcb);
    color:#000;
}

.btn3{
    background: linear-gradient(45deg, #f7971e, #ffd200);
    color:#000;
}

/* Hover effect */
button:hover{
    transform: scale(1.07);
    box-shadow:0px 12px 25px rgba(0,0,0,0.4);
}
</style>

</head>

<body>

<div class="container">
    <h1>🚀 Java Learning Hub</h1>
    <p>Select a module to start learning</p>

    <div class="btn-container">

        <a href="cal.html" class="button">
            <button class="btn1">🧮 Java Binary Converter</button>
        </a>

        <a href="datatypes.html" class="button">
            <button class="btn2">📊 Data Types in Java</button>
        </a>

        <a href="DataUnits.html" class="button">
            <button class="btn3">💾 Standard Digital Data Units</button>
        </a>

    </div>
</div>

</body>
</html>
